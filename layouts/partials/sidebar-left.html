<!-- 左侧边栏：分类导航 -->
<aside class="sidebar-left">
  <div class="sidebar-left-inner">

    <div class="sidebar-section">

      <div class="sidebar-section-header">
        <span class="sidebar-section-title">分类</span>
        <div class="sidebar-section-line"></div>
      </div>

      <nav class="cat-nav-list">

        {{ range $name, $taxonomy := .Site.Taxonomies.categories }}

        <a href="{{ "/categories/" | relLangURL }}{{ $name | urlize }}/"
           class="cat-nav-item">

          <span class="cat-nav-icon">✎</span>

          <div>
            <div class="cat-nav-name">
              {{ $name }}
            </div>

            <div class="cat-nav-count">
              {{ len $taxonomy.Pages }} 篇
            </div>
          </div>

        </a>

        {{ end }}

      </nav>

    </div>

  </div>
</aside>
