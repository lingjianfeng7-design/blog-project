<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  
  <style>
    /* ========== Reset & Base ========== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --note-text: {{ .Site.Params.colors.text | default "#1a1a1a" }};
      --note-muted: {{ .Site.Params.colors.muted | default "#999" }};
      --note-border: {{ .Site.Params.colors.border | default "#e5e5e5" }};
      --note-accent: {{ .Site.Params.colors.accent | default "#c4713b" }};
      --note-bg: {{ .Site.Params.colors.background | default "#fafaf7" }};
      --font-sans: {{ .Site.Params.fonts.sans | default "'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', system-ui, -apple-system, sans-serif" }};
      --font-mono: {{ .Site.Params.fonts.mono | default "ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" }};
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--note-bg);
      color: var(--note-text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }

    /* ========== Page Navigation ========== */
    .page-nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--note-bg);
      border-bottom: 1px solid var(--note-border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
    }
    .page-nav-btn {
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 3px;
      color: var(--note-muted);
      transition: all 0.15s;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .page-nav-btn:hover { color: var(--note-text); }
    .page-nav-btn.active {
      color: var(--note-text);
      background: #fff;
      border-color: var(--note-border);
    }

    /* ========== Page visibility ========== */
    .page { display: none; }
    .page.active { display: block; }

    /* ========== Header ========== */
    .site-header {
      border-bottom: 1px solid var(--note-border);
      padding: 24px 0;
    }
    .site-header-inner {
      max-width: {{ .Site.Params.layout.max_width | default 1152 }}px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .site-logo {
      font-family: var(--font-mono);
      font-size: 18px;
      letter-spacing: -0.02em;
      color: var(--note-text);
      transition: opacity 0.15s;
    }
    .site-logo:hover { opacity: 0.7; }

    /* ========== Three-Column Layout ========== */
    .three-col {
      max-width: {{ .Site.Params.layout.max_width | default 1152 }}px;
      margin: 0 auto;
      padding: 40px 24px;
      display: flex;
      gap: 40px;
    }
    .sidebar-left { width: {{ .Site.Params.layout.sidebar_left_width | default 208 }}px; flex-shrink: 0; }
    .sidebar-left-inner { position: sticky; top: 80px; }
    .content-main { flex: 1; min-width: 0; }
    .sidebar-right { width: {{ .Site.Params.layout.sidebar_right_width | default 240 }}px; flex-shrink: 0; }
    .sidebar-right-inner { position: sticky; top: 80px; }

    /* ========== Sidebar Section ========== */
    .sidebar-section { margin-bottom: 32px; }
    .sidebar-section:last-child { margin-bottom: 0; }
    .sidebar-section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .sidebar-section-title {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--note-muted);
      white-space: nowrap;
    }
    .sidebar-section-line {
      flex: 1;
      height: 1px;
      background: var(--note-border);
    }

    /* ========== Category Nav (Left Sidebar) ========== */
    .cat-nav-list { display: flex; flex-direction: column; }
    .cat-nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid var(--note-border);
      transition: color 0.15s;
      cursor: pointer;
    }
    .cat-nav-item:last-child { border-bottom: none; }
    .cat-nav-item:hover .cat-nav-name { color: var(--note-accent); }
    .cat-nav-item.active .cat-nav-name { color: var(--note-accent); }
    .cat-nav-item.active { border-bottom-color: var(--note-accent); }
    .cat-nav-icon {
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--note-accent);
      flex-shrink: 0;
    }
    .cat-nav-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--note-text);
      transition: color 0.15s;
    }
    .cat-nav-count {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--note-muted);
      margin-top: 2px;
    }

    /* ========== Right Sidebar Content ========== */
    .about-text { font-size: 13px; line-height: 1.7; color: var(--note-muted); }
    .about-slogan { font-family: var(--font-mono); font-size: 12px; color: var(--note-muted); margin-top: 8px; }
    .author-text { font-size: 13px; line-height: 1.7; color: var(--note-muted); }
    .contact-list { display: flex; flex-direction: column; gap: 8px; }
    .contact-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--note-muted);
    }
    .contact-icon { color: var(--note-accent); font-size: 14px; }
    .sidebar-divider { border: none; border-top: 1px solid var(--note-border); margin: 24px 0; }

    /* ========== Section Header ========== */
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .section-title {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--note-muted);
      white-space: nowrap;
    }
    .section-line { flex: 1; height: 1px; background: var(--note-border); }
    .section-count { font-family: var(--font-mono); font-size: 10px; color: var(--note-muted); flex-shrink: 0; }

    /* ========== Post List ========== */
    .post-list { }
    .post-item {
      padding: 24px 0;
      border-bottom: 1px solid var(--note-border);
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .post-item:last-child { border-bottom: none; }
    .post-index {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--note-muted);
      margin-top: 3px;
      flex-shrink: 0;
      min-width: 20px;
    }
    .post-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .post-date { font-family: var(--font-mono); font-size: 12px; color: var(--note-muted); }
    .post-dot { color: var(--note-border); font-size: 10px; }
    .post-category {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--note-accent);
      transition: opacity 0.15s;
    }
    .post-category:hover { opacity: 0.7; }
    .post-title {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.5;
      color: var(--note-text);
      transition: color 0.15s;
      cursor: pointer;
    }
    .post-title:hover { color: var(--note-accent); }
    .post-excerpt { margin-top: 8px; font-size: 13px; line-height: 1.7; color: var(--note-muted); }
    .post-tags { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px; }
    .post-tag { font-family: var(--font-mono); font-size: 10px; color: var(--note-muted); }
    .post-read {
      display: inline-block;
      margin-top: 10px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--note-accent);
      transition: opacity 0.15s;
    }
    .post-read:hover { opacity: 0.7; }

    /* ========== Footer ========== */
    .site-footer {
      border-top: 1px solid var(--note-border);
      padding: 40px 0;
      margin-top: 40px;
    }
    .footer-inner {
      max-width: {{ .Site.Params.layout.max_width | default 1152 }}px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .footer-desc {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--note-muted);
      margin-bottom: 32px;
    }
    .footer-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
      margin-bottom: 32px;
    }
    .footer-cat-title {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--note-text);
      transition: color 0.15s;
      display: block;
      margin-bottom: 8px;
    }
    .footer-cat-title:hover { color: var(--note-accent); }
    .footer-cat-desc { font-size: 12px; color: var(--note-muted); }
    .footer-bottom {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--note-muted);
      border-top: 1px solid var(--note-border);
      padding-top: 24px;
    }

    /* ========== Pagination ========== */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 40px;
    }
    .pagination-btn {
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 6px 12px;
      border: 1px solid var(--note-border);
      border-radius: 3px;
      color: var(--note-muted);
      transition: all 0.15s;
    }
    .pagination-btn:hover { color: var(--note-text); border-color: var(--note-text); }
    .pagination-btn.active { color: var(--note-text); background: #fff; }

    /* ========== Post Detail ========== */
    .post-detail-header { margin-bottom: 32px; }
    .post-detail-title {
      font-size: 24px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--note-text);
      margin-bottom: 16px;
    }
    .post-detail-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--note-muted);
    }
    .post-detail-content { font-size: 15px; line-height: 1.8; }
    .post-detail-content h1,
    .post-detail-content h2,
    .post-detail-content h3 { margin: 24px 0 16px; font-weight: 600; }
    .post-detail-content p { margin-bottom: 16px; }
    .post-detail-content a { color: var(--note-accent); }
    .post-detail-content a:hover { opacity: 0.7; }
    .post-detail-content code {
      font-family: var(--font-mono);
      font-size: 13px;
      background: #f0f0eb;
      padding: 2px 6px;
      border-radius: 3px;
    }
    .post-detail-content pre {
      background: #f0f0eb;
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 16px 0;
    }
    .post-detail-content pre code {
      background: none;
      padding: 0;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--note-muted);
      margin-bottom: 24px;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--note-accent); }

    /* ========== Responsive ========== */
    @media (max-width: 900px) {
      .three-col { flex-direction: column; }
      .sidebar-left, .sidebar-right { width: 100%; }
      .sidebar-left-inner, .sidebar-right-inner { position: static; }
      .footer-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  {{ partial "header.html" . }}

  {{ block "main" . }}{{ end }}

  {{ partial "footer.html" . }}
</body>
</html>
