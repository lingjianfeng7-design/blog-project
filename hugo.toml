baseURL = 'https://example.org/'
languageCode = 'zh-cn'
title = 'ShopifyNote'
theme = "" # 可添加Hugo主题，或留空使用自定义模板

# 网站元数据
[params]
  description = "Shopify 电商实践笔记"
  author = "独立开发者"
  author_bio = "独立开发者，长期关注 Shopify 生态。从主题开发到店铺运营，踩过不少坑，也积累了一些心得。"
  email = "hello@shopifynote.com"
  twitter = "@shopifynote"
  github = "shopifynote"

# 导航配置
[[params.nav]]
  name = "首页"
  id = "home"
  url = "/"

[[params.nav]]
  name = "店铺装修"
  id = "cat-design"
  url = "/categories/shopify店铺装修/"

[[params.nav]]
  name = "网站优化"
  id = "cat-optimize"
  url = "/categories/shopify网站优化/"

[[params.nav]]
  name = "主题开发"
  id = "cat-theme"
  url = "/categories/shopify主题开发/"

# 分类配置
[[params.categories]]
  id = "cat-design"
  name = "Shopify店铺装修"
  icon = "✎"
  description = "从视觉设计到用户体验，打造高转化率的 Shopify 店铺"
  count = 0

[[params.categories]]
  id = "cat-optimize"
  name = "Shopify网站优化"
  icon = "◈"
  description = "速度、SEO、转化率全方位优化实战笔记"
  count = 0

[[params.categories]]
  id = "cat-theme"
  name = "Shopify主题开发"
  icon = "▸"
  description = "Liquid 模板语言、主题定制与开发技巧"
  count = 0

# 底部分类链接
[[params.footer_cats]]
  name = "Shopify店铺装修"
  url = "/categories/shopify店铺装修/"
  desc = "从视觉设计到用户体验，打造高转化率的 Shopify 店铺"

[[params.footer_cats]]
  name = "Shopify网站优化"
  url = "/categories/shopify网站优化/"
  desc = "速度、SEO、转化率全方位优化实战笔记"

[[params.footer_cats]]
  name = "Shopify主题开发"
  url = "/categories/shopify主题开发/"
  desc = "Liquid 模板语言、主题定制与开发技巧"

# 颜色配置
[params.colors]
  text = "#1a1a1a"
  muted = "#999"
  border = "#e5e5e5"
  accent = "#c4713b"
  background = "#fafaf7"

# 布局配置
[params.layout]
  max_width = 1152
  sidebar_left_width = 208
  sidebar_right_width = 240

# 排版配置
[params.fonts]
  sans = "'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', system-ui, -apple-system, sans-serif"
  mono = "ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace"

# Hugo 内置配置
enableRobotsTXT = true
enableGitInfo = false
hasCJKLanguage = true
paginate = 10

#  Permalink 配置
[permalinks]
  post = "/:filename/"
  page = "/:filename/"
